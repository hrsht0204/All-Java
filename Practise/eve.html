<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Event Organizer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
        }
        .header {
            background-color: #343a40;
            color: white;
            padding: 15px;
            text-align: center;
        }
        .container {
            width: 80%;
            margin: 20px auto;
        }
        .section {
            background: white;
            margin-bottom: 20px;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        h2 {
            margin-top: 0;
        }
        .button {
            display: inline-block;
            padding: 10px 20px;
            margin: 5px;
            border: none;
            background-color: #007bff;
            color: white;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
        }
        .button:hover {
            background-color: #0056b3;
        }
        input[type="text"], input[type="datetime-local"] {
            padding: 10px;
            width: calc(100% - 22px);
            border-radius: 4px;
            border: 1px solid #ddd;
            margin-bottom: 10px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        table, th, td {
            border: 1px solid #ddd;
        }
        th, td {
            padding: 10px;
            text-align: left;
        }
        th {
            background-color: #f4f4f4;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Virtual Event Organizer</h1>
    </div>
    <div class="container">
        <div class="section">
            <h2>Create Event</h2>
            <input type="text" id="eventName" placeholder="Event Name">
            <input type="datetime-local" id="eventDateTime">
            <input type="text" id="eventDescription" placeholder="Event Description">
            <button class="button" onclick="createEvent()">Create Event</button>
        </div>
        <div class="section">
            <h2>Event List</h2>
            <table id="eventsTable">
                <thead>
                    <tr>
                        <th>Event Name</th>
                        <th>Date & Time</th>
                        <th>Description</th>
                        <th>Guests</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Event rows go here -->
                </tbody>
            </table>
        </div>
        <div class="section">
            <h2>Add Guests</h2>
            <input type="text" id="guestName" placeholder="Guest Name">
            <input type="text" id="guestEmail" placeholder="Guest Email">
            <input type="text" id="eventToAddGuest" placeholder="Event Name">
            <button class="button" onclick="addGuest()">Add Guest</button>
        </div>
    </div>
    <script>
        const events = {};

        function createEvent() {
            const name = document.getElementById('eventName').value;
            const dateTime = document.getElementById('eventDateTime').value;
            const description = document.getElementById('eventDescription').value;
            if (name && dateTime && description) {
                events[name] = { dateTime, description, guests: [] };
                updateEventList();
                document.getElementById('eventName').value = '';
                document.getElementById('eventDateTime').value = '';
                document.getElementById('eventDescription').value = '';
            }
        }

        function addGuest() {
            const guestName = document.getElementById('guestName').value;
            const guestEmail = document.getElementById('guestEmail').value;
            const eventName = document.getElementById('eventToAddGuest').value;
            if (guestName && guestEmail && eventName && events[eventName]) {
                events[eventName].guests.push({ name: guestName, email: guestEmail });
                updateEventList();
                document.getElementById('guestName').value = '';
                document.getElementById('guestEmail').value = '';
                document.getElementById('eventToAddGuest').value = '';
            }
        }

        function updateEventList() {
            const table = document.getElementById('eventsTable').getElementsByTagName('tbody')[0];
            table.innerHTML = '';
            for (const [eventName, eventDetails] of Object.entries(events)) {
                const row = table.insertRow();
                row.insertCell(0).innerText = eventName;
                row.insertCell(1).innerText = eventDetails.dateTime;
                row.insertCell(2).innerText = eventDetails.description;
                row.insertCell(3).innerText = eventDetails.guests.map(guest => guest.name).join(', ');
            }
        }
    </script>
</body>
</html>
