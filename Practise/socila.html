<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mock Social Network</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        .profile {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .profile img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            margin-right: 10px;
            vertical-align: middle;
        }
        .profile h2 {
            display: inline;
        }
        .post {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .post h3 {
            margin-top: 0;
        }
        .post p {
            font-size: 16px;
            line-height: 1.5;
        }
        .add-post {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .add-post textarea {
            width: 100%;
            height: 100px;
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ddd;
        }
        .add-post button {
            padding: 10px 20px;
            border: none;
            background: #007bff;
            color: #fff;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="profile">
            <img src="https://via.placeholder.com/50" alt="Profile Pic">
            <h2>Chad Thunderbolt</h2>
            <p>Just mastered the art of doing absolutely nothing all day! 💪😎</p>
        </div>

        <div class="profile">
            <img src="https://via.placeholder.com/50" alt="Profile Pic">
            <h2>Linda Loco</h2>
            <p>Attempted to bake a cake. Now I have a new kitchen table. 🎂🔥</p>
        </div>

        <div class="add-post">
            <h3>Add a New Post</h3>
            <textarea id="post-content" placeholder="What's on your mind?"></textarea>
            <button onclick="addPost()">Post</button>
        </div>

        <div id="posts">
            <!-- New posts will be added here -->
        </div>
    </div>

    <script>
        function addPost() {
            var content = document.getElementById('post-content').value;
            if (content.trim() === '') {
                alert('Post cannot be empty!');
                return;
            }

            var postContainer = document.createElement('div');
            postContainer.className = 'post';

            var postHTML = `
                <h3>Anonymous</h3>
                <p>${content}</p>
            `;

            postContainer.innerHTML = postHTML;
            document.getElementById('posts').appendChild(postContainer);

            document.getElementById('post-content').value = '';
        }
    </script>
</body>
</html>
