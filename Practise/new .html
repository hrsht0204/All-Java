<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Finance Tracker</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f9f9f9;
        }
        .header {
            background-color: #007bff;
            color: white;
            padding: 15px;
            text-align: center;
        }
        .container {
            width: 80%;
            margin: 20px auto;
        }
        .section {
            background: white;
            margin-bottom: 20px;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        h2 {
            margin-top: 0;
        }
        .button {
            display: inline-block;
            padding: 10px 20px;
            margin: 5px;
            border: none;
            background-color: #28a745;
            color: white;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
        }
        .button:hover {
            background-color: #218838;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        table, th, td {
            border: 1px solid #ddd;
        }
        th, td {
            padding: 10px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
        input[type="number"], input[type="text"] {
            padding: 10px;
            width: calc(100% - 22px);
            border-radius: 4px;
            border: 1px solid #ddd;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Personal Finance Tracker</h1>
    </div>
    <div class="container">
        <div class="section">
            <h2>Savings Goals</h2>
            <input type="text" id="goalName" placeholder="Goal Name">
            <input type="number" id="goalAmount" placeholder="Goal Amount" min="0">
            <button class="button" onclick="addGoal()">Add Goal</button>
            <table id="goalsTable">
                <thead>
                    <tr>
                        <th>Goal Name</th>
                        <th>Goal Amount</th>
                        <th>Progress</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Goals rows go here -->
                </tbody>
            </table>
        </div>
        <div class="section">
            <h2>Expense Tracker</h2>
            <input type="text" id="expenseDescription" placeholder="Expense Description">
            <input type="number" id="expenseAmount" placeholder="Expense Amount" min="0">
            <button class="button" onclick="addExpense()">Add Expense</button>
            <table id="expensesTable">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Description</th>
                        <th>Amount</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Expense rows go here -->
                </tbody>
            </table>
        </div>
        <div class="section">
            <h2>Investment Summary</h2>
            <p>Total Investments: <span id="totalInvestments">$0.00</span></p>
            <input type="number" id="investmentAmount" placeholder="Investment Amount" min="0">
            <button class="button" onclick="updateInvestments()">Update Investments</button>
        </div>
    </div>
    <script>
        let totalInvestments = 0;

        function addGoal() {
            const name = document.getElementById('goalName').value;
            const amount = parseFloat(document.getElementById('goalAmount').value);
            if (name && amount) {
                const table = document.getElementById('goalsTable').getElementsByTagName('tbody')[0];
                const row = table.insertRow();
                row.insertCell(0).innerText = name;
                row.insertCell(1).innerText = `$${amount.toFixed(2)}`;
                row.insertCell(2).innerText = "0%"; // Placeholder for progress
                document.getElementById('goalName').value = '';
                document.getElementById('goalAmount').value = '';
            }
        }

        function addExpense() {
            const description = document.getElementById('expenseDescription').value;
            const amount = parseFloat(document.getElementById('expenseAmount').value);
            if (description && amount) {
                const table = document.getElementById('expensesTable').getElementsByTagName('tbody')[0];
                const row = table.insertRow();
                row.insertCell(0).innerText = new Date().toLocaleDateString();
                row.insertCell(1).innerText = description;
                row.insertCell(2).innerText = `$${amount.toFixed(2)}`;
                document.getElementById('expenseDescription').value = '';
                document.getElementById('expenseAmount').value = '';
            }
        }

        function updateInvestments() {
            const amount = parseFloat(document.getElementById('investmentAmount').value);
            if (amount) {
                totalInvestments += amount;
                document.getElementById('totalInvestments').innerText = `$${totalInvestments.toFixed(2)}`;
                document.getElementById('investmentAmount').value = '';
            }
        }
    </script>
</body>
</html>
